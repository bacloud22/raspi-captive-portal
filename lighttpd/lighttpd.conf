server.modules = (
    "mod_alias",
    "mod_cgi",
    "mod_redirect"
)

# PROJECT_DIR is replaced by setup.py with the absolute project path
server.document-root = "PROJECT_DIR/server/public"
server.port = 80

mimetype.assign = (
    ".html" => "text/html",
    ".js"   => "application/javascript",
    ".css"  => "text/css",
    ".ico"  => "image/x-icon"
)

# Captive portal: redirect every unknown hostname to our portal.
# dnsmasq already resolves all domains to 192.168.4.1 (the Pi), so
# clients arrive here with their original Host header — we redirect
# them to the portal hostname so they land on the right page.
$HTTP["host"] != "splines.portal" {
    url.redirect = ("" => "http://splines.portal/")
}

# Map API and admin paths to CGI shell scripts.
# alias.url matches on the URL path (query string is ignored).
alias.url = (
    "/api/ping"      => "PROJECT_DIR/server/cgi-bin/ping.sh",
    "/admin/disable" => "PROJECT_DIR/server/cgi-bin/admin-disable.sh"
)

# Run any .sh file as a CGI script via /bin/sh
cgi.assign = ( ".sh" => "/bin/sh" )
